<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TrackPulse Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="/shared/utils.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }

:root {
  --ov-bg:        rgba(6,12,16,0.82);
  --ov-border:    rgba(255,255,255,0.12);
  --ov-radius:    14px;
  --ov-blur:      12px;
  --ov-accent:    #02cda4;
  --ov-title:     #f3f9f8;
  --ov-artist:    rgba(243,249,248,0.62);
  --ov-maxw:      420px;
  --ov-art-sz:    52px;
  --ov-prog-h:    3px;
  --ov-title-sz:  15px;
  --ov-artist-sz: 12px;
  --ov-font:      'Segoe UI', system-ui, sans-serif;
}

body {
  font-family: var(--ov-font);
  color: #f3f9f8;
  display: flex;
  align-items: flex-end;
  justify-content: flex-start;
  padding: 16px;
}
body.pos-bottom-right { align-items: flex-end;  justify-content: flex-end;   }
body.pos-top-left     { align-items: flex-start; justify-content: flex-start; }
body.pos-top-right    { align-items: flex-start; justify-content: flex-end;   }
body.pos-center       { align-items: center;     justify-content: center;     }

.card {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--ov-bg);
  border: 1px solid var(--ov-border);
  border-radius: var(--ov-radius);
  padding: 10px 14px 10px 10px;
  backdrop-filter: blur(var(--ov-blur));
  max-width: var(--ov-maxw);
  width: 100%;
  transition: opacity .4s ease;
}
.card.hidden { opacity: 0; pointer-events: none; }

.art {
  width: var(--ov-art-sz);
  height: var(--ov-art-sz);
  border-radius: 8px;
  flex-shrink: 0;
  background: linear-gradient(135deg, rgba(2,205,164,0.3), rgba(255,149,64,0.3));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  overflow: hidden;
}
.art.no-art { display: none; }
.art img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }

.info { flex: 1; min-width: 0; }
.label {
  font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--ov-accent); margin-bottom: 3px;
}
.title {
  font-size: var(--ov-title-sz); font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--ov-title); line-height: 1.2;
}
.artist {
  font-size: var(--ov-artist-sz);
  color: var(--ov-artist);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px;
}
.time {
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
  color: var(--ov-artist); margin-top: 3px;
}
.time.hidden { display: none; }

.progress-wrap {
  margin-top: 7px; background: rgba(255,255,255,0.1);
  border-radius: 999px; height: var(--ov-prog-h); overflow: hidden;
}
.progress-wrap.hidden { display: none; }
.progress-bar {
  height: 100%; background: linear-gradient(90deg, var(--ov-accent), var(--ov-accent));
  border-radius: 999px; width: 0%; transition: width .8s linear;
}

.announce {
  position: fixed; top: 16px; left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: rgba(2,205,164,0.18); border: 1px solid rgba(2,205,164,0.5);
  border-radius: 999px; padding: 8px 20px;
  font-size: 13px; font-weight: 600; color: #52f3c8;
  white-space: nowrap; backdrop-filter: blur(8px);
  transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s ease;
  opacity: 0; pointer-events: none;
}
.announce.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<div class="card hidden" id="card">
  <div class="art" id="art">🎵</div>
  <div class="info">
    <div class="label" id="ov-label">Now Playing</div>
    <div class="title"  id="title">—</div>
    <div class="artist" id="artist"></div>
    <div class="time hidden" id="time"></div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-bar" id="progress"></div>
    </div>
  </div>
</div>
<div class="announce" id="announce"></div>

<script>
const card       = document.getElementById('card');
const artEl      = document.getElementById('art');
const titleEl    = document.getElementById('title');
const artistEl   = document.getElementById('artist');
const timeEl     = document.getElementById('time');
const progEl     = document.getElementById('progress');
const progWrapEl = document.getElementById('progress-wrap');
const labelEl    = document.getElementById('ov-label');
const announceEl = document.getElementById('announce');

let announceTimer = null;

function fmt(sec) {
  const s = Math.max(0, Math.round(sec || 0));
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

function hex2rgba(hex, alpha) {
  if (!hex || hex.length < 7) return `rgba(6,12,16,${alpha})`;
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function applyConfig(ov) {
  ov = ov || {};
  const rs = document.documentElement.style;
  rs.setProperty('--ov-bg',        hex2rgba(ov.bgColor || '#060c10', ov.bgOpacity ?? 0.82));
  rs.setProperty('--ov-radius',    (ov.radius           ?? 14) + 'px');
  rs.setProperty('--ov-blur',      (ov.blur             ?? 12) + 'px');
  rs.setProperty('--ov-accent',    ov.accentColor        || '#02cda4');
  rs.setProperty('--ov-title',     ov.titleColor         || '#f3f9f8');
  rs.setProperty('--ov-artist',    ov.artistColor        || 'rgba(243,249,248,0.62)');
  rs.setProperty('--ov-maxw',      (ov.maxWidth         ?? 420) + 'px');
  rs.setProperty('--ov-art-sz',    (ov.artSize          ?? 52)  + 'px');
  rs.setProperty('--ov-prog-h',    (ov.progressHeight   ?? 3)   + 'px');
  rs.setProperty('--ov-title-sz',  (ov.titleSize        ?? 15)  + 'px');
  rs.setProperty('--ov-artist-sz', (ov.artistSize       ?? 12)  + 'px');

  const fontMap = { archivo: "'Archivo',sans-serif", jetbrains: "'JetBrains Mono',monospace" };
  rs.setProperty('--ov-font', fontMap[ov.font] || "'Segoe UI',system-ui,sans-serif");

  document.body.className = 'pos-' + (ov.position || 'bottom-left');
  artEl.classList.toggle('no-art',    !(ov.showArt      ?? true));
  progWrapEl.classList.toggle('hidden', !(ov.showProgress ?? true));
  timeEl.classList.toggle('hidden',   !(ov.showTime     ?? false));
  labelEl.textContent = ov.labelText || 'Now Playing';
}

function applyStatus(s) {
  const tr = s?.currentTrack || {};
  const p  = s?.player       || {};
  const playing = p.state === 'playing' || p.state === 'paused';
  card.classList.toggle('hidden', !playing || !tr.title);
  if (!playing || !tr.title) return;

  titleEl.textContent  = tr.title  || '—';
  artistEl.textContent = tr.artist || '';

  const trackId = p.currentTrackId;
  if (trackId) {
    if (!artEl.querySelector('img') || artEl.dataset.trackId !== trackId) {
      artEl.dataset.trackId = trackId;
      artEl.innerHTML = `<img src="/api/trackpulse/cover/${trackId}" alt="cover" onerror="this.parentNode.innerHTML='🎵'">`;
    }
  } else if (artEl.dataset.trackId) {
    delete artEl.dataset.trackId;
    artEl.innerHTML = '🎵';
  }

  const dur = p.mediaDuration || 0;
  const cur = p.mediaCursor   || 0;
  progEl.style.width = dur > 0 ? `${Math.min(100, (cur / dur) * 100).toFixed(1)}%` : '0%';
  timeEl.textContent = `${fmt(cur)} / ${fmt(dur)}`;
}

function showAnnounce(text) {
  announceEl.textContent = `🎵 ${text}`;
  announceEl.classList.add('show');
  clearTimeout(announceTimer);
  announceTimer = setTimeout(() => announceEl.classList.remove('show'), 5000);
}

function connect() {
  const ws = new WebSocket(`ws://${location.host}`);
  ws.addEventListener('message', e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'TRACKPULSE_STATUS'        && msg.payload)       applyStatus(msg.payload);
      if (msg.type === 'TRACKPULSE_ANNOUNCE'       && msg.payload?.text) showAnnounce(msg.payload.text);
      if (msg.type === 'TRACKPULSE_OVERLAY_CONFIG' && msg.payload)       applyConfig(msg.payload);
    } catch {}
  });
  ws.addEventListener('close', () => setTimeout(connect, 2000));
}

async function boot() {
  try {
    const c = await safeJson('/api/trackpulse/config');
    applyConfig(c.overlay || {});
  } catch {}
  if (new URLSearchParams(location.search).has('preview')) {
    applyStatus({
      currentTrack: { title: 'Midnight Drive', artist: 'Neon Sunrise' },
      player: { state: 'playing', mediaDuration: 245, mediaCursor: 73, currentTrackId: null },
    });
    return;
  }
  safeJson('/api/trackpulse/status').then(applyStatus).catch(() => {});
  connect();
}

boot();
</script>
</body>
</html>
