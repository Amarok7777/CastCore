<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ControlDeck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/design.css">
<link rel="stylesheet" href="/tool/controldeck/controldeck.css">
<script src="/shared/i18n.js"></script>
<script src="/shared/utils.js"></script>
<script src="/shared/ws-client.js"></script>
<script src="/shared/platform-status.js"></script>
<script src="/shared/winctrl.js" defer></script>
</head>
<body>
<header class="tool-topbar">
  <div class="tool-topbar-brand">
    <span class="tool-topbar-name">Control<em>Deck</em></span>
    <span class="tool-topbar-sub" data-i18n="controldeck.subtitle"></span>
  </div>
  <div class="tool-topbar-status">
    <span id="obs-pill" class="obs-pill">
      <span class="obs-dot"></span>
      <span data-i18n="controldeck.obs_disconnected"></span>
    </span>
  </div>
  <a class="link" href="/">← Hub</a>
</header>
<div class="app">

  <!-- Deck Grid -->
  <div class="deck">

    <!-- ── OBS Controls ──────────────────────────────────── -->
    <div class="card span-3" id="obs-ctrl-card">
      <div class="obs-ctrl-layout">

        <!-- Controls (2/3) -->
        <div class="obs-ctrl-main">
          <div class="obs-ctrl-stack">

            <button class="obs-ctrl-btn" id="stream-btn" onclick="toggleStream()" disabled>
              <span class="obs-live-dot" id="stream-dot"></span>
              <span id="stream-label" data-i18n="controldeck.stream.start">Stream starten</span>
              <span class="obs-ctrl-time" id="stream-time"></span>
            </button>

            <div class="obs-ctrl-record-row">
              <button class="obs-ctrl-btn" id="record-btn" onclick="toggleRecord()" disabled>
                <span class="obs-live-dot" id="record-dot"></span>
                <span id="record-label" data-i18n="controldeck.record.start">Aufnahme starten</span>
                <span class="obs-ctrl-time" id="record-time"></span>
              </button>
              <button class="btn xs" id="record-pause-btn" onclick="toggleRecordPause()" style="display:none" data-i18n-attr="title" data-i18n="controldeck.record.pause" title="Aufnahme pausieren">⏸</button>
            </div>

            <button class="obs-ctrl-btn" id="vcam-btn" onclick="toggleVirtualCam()" disabled>
              <span class="obs-live-dot" id="vcam-dot"></span>
              <span id="vcam-label" data-i18n="controldeck.vcam.label">Virtual Camera</span>
            </button>

          </div>
        </div>

        <!-- Stats -->
        <div class="obs-stats-panel" id="obs-stats-panel">
          <div class="obs-stat-cell">
            <span class="obs-stat-val" id="ctrl-fps">—</span>
            <span class="obs-stat-lbl">FPS</span>
          </div>
          <div class="obs-stat-cell">
            <span class="obs-stat-val" id="ctrl-cpu">—</span>
            <span class="obs-stat-lbl">CPU</span>
          </div>
          <div class="obs-stat-cell">
            <span class="obs-stat-val" id="ctrl-ram">—</span>
            <span class="obs-stat-lbl">RAM</span>
          </div>
          <div class="obs-stat-cell">
            <span class="obs-stat-val" id="ctrl-dropped">—</span>
            <span class="obs-stat-lbl">Dropped</span>
          </div>
        </div>

        <!-- Preview — Höhe = Button-Stack, Breite via aspect-ratio -->
        <div class="obs-ctrl-preview-embed">
          <img id="scene-preview-img" class="scene-preview-img" alt=""
            onerror="this.style.opacity='0'">
          <div class="scene-preview-offline" id="scene-preview-offline">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          </div>
        </div>

      </div>
    </div>

    <!-- ── EventForge ─────────────────────────────────────── -->
    <div class="card" id="eventforge-card">
      <div class="card-header">
        <span class="card-title" data-i18n="controldeck.eventforge.card"></span>
        <span class="card-badge warn" id="ef-badge" data-i18n="controldeck.timer.ready"></span>
        <span style="font-size:10px;color:rgba(243,249,248,0.3);margin-left:auto" id="ef-count"></span>
        <a href="/tool/alertdeck" style="font-size:10px;color:#a7fff0;text-decoration:none;border:1px solid rgba(167,255,240,0.3);border-radius:6px;padding:2px 7px;" data-i18n="controldeck.eventforge.open"></a>
      </div>

      <div class="alert-summary-grid">
        <div class="alert-stat">
          <div class="alert-stat-label" data-i18n="controldeck.total"></div>
          <div class="alert-stat-value" id="ef-total">0</div>
        </div>
        <div class="alert-stat">
          <div class="alert-stat-label">Twitch</div>
          <div class="alert-stat-value" id="ef-twitch">0</div>
        </div>
        <div class="alert-stat">
          <div class="alert-stat-label">YouTube</div>
          <div class="alert-stat-value" id="ef-youtube">0</div>
        </div>
      </div>

      <div class="alert-latest">
        <div class="alert-latest-label" data-i18n="controldeck.latest_alert"></div>
        <div class="alert-latest-text" id="ef-latest" data-i18n="controldeck.no_alerts"></div>
      </div>

      <div class="alert-feed-mini" id="ef-feed">
        <div class="empty-hint" id="ef-empty" data-i18n="controldeck.no_alerts">Noch keine Alerts</div>
      </div>
    </div>

    <!-- ── Music ───────────────────────────────────────────── -->
    <div class="card" id="music-card">
      <div class="card-header">
        <span class="card-title" data-i18n="controldeck.music.card"></span>
        <span class="card-badge warn" id="music-badge" data-i18n="controldeck.music.stopped"></span>
      </div>

      <div class="now-playing">
        <div class="np-art" id="np-art">🎵</div>
        <div class="np-info">
          <div id="np-title" data-i18n="controldeck.no_playback"></div>
          <div id="np-artist">—</div>
          <div class="np-progress-wrap"><div class="np-progress-bar" id="np-progress"></div></div>
          <div class="np-time" id="np-time"></div>
        </div>
        <span class="np-state" id="np-state">—</span>
      </div>

      <div class="np-vol-row">
        <span class="np-vol-label">🔊</span>
        <input type="range" id="np-vol" min="0" max="100" value="100" step="1">
        <span class="np-vol-label" id="np-vol-val">100%</span>
      </div>

      <div class="music-controls" style="margin-top:8px">
        <button class="btn icon mode" id="btn-shuffle" data-i18n-attr="title" data-i18n="tunapilot.shuffle_off" onclick="toggleMusicShuffle()">⇄</button>
        <button class="btn icon" data-i18n-attr="title" data-i18n="tunapilot.prev_track" onclick="musicAction('prev')">⏮</button>
        <button class="btn primary icon" id="btn-play-pause" title="Play/Pause" onclick="togglePlayPause()">▶</button>
        <button class="btn icon" data-i18n-attr="title" data-i18n="tunapilot.next_track" onclick="musicAction('next')">⏭</button>
        <button class="btn icon mode" id="btn-loop" title="Loop" onclick="toggleMusicLoop()">↻</button>
      </div>

      <div class="mini-playlist" id="mini-playlist">
        <div class="empty-hint" data-i18n="controldeck.no_tracks"></div>
      </div>

      <div class="pl-switcher-section" id="pl-switcher" style="display:none">
        <div class="pl-switcher-label">Playlists</div>
        <div class="pl-switch-list" id="pl-switch-list"></div>
      </div>
    </div>

    <!-- ── Scenes ──────────────────────────────────────────── -->
    <div class="card" id="scenes-card">
      <div class="card-header">
        <span class="card-title" data-i18n="controldeck.scenes.card"></span>
        <span class="card-badge warn" id="scenes-badge" data-i18n="controldeck.obs_disconnected"></span>
        <button class="btn xs" id="scenes-manage-btn" onclick="toggleSceneManage()" style="margin-left:auto;display:none" data-i18n-attr="title" data-i18n="controldeck.scenes.manage_title">
          <svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="7" cy="7" r="1.5"/><path d="M1 7s2.5-4 6-4 6 4 6 4-2.5 4-6 4-6-4-6-4z"/></svg>
          <span data-i18n="controldeck.scenes.manage"></span>
        </button>
      </div>
      <div style="font-size:11px;color:rgba(243,249,248,0.45);margin-bottom:9px;min-height:16px;" id="obs-current-scene"></div>
      <div class="scene-grid" id="scene-grid">
        <div class="empty-hint" data-i18n="controldeck.no_scenes"></div>
      </div>
      <div id="scene-manage-panel" style="display:none">
        <div class="scene-manage-list" id="scene-manage-list"></div>
        <p class="scene-manage-note" data-i18n="controldeck.scene_manage_note"></p>
      </div>
    </div>

    <!-- ── Timer ───────────────────────────────────────────── -->
    <div class="card" id="timer-card">
      <div class="card-header">
        <span class="card-title" data-i18n="controldeck.timer.card"></span>
        <span class="card-badge warn" id="timer-badge" data-i18n="controldeck.timer.ready"></span>
      </div>

      <div class="timer-display">
        <div id="timer-time">0:00:00.000</div>
        <div class="timer-meta">
          <span id="timer-profile" data-i18n="controldeck.timer.no_profile"></span>
          <span class="state-pill" id="state-pill" data-i18n="controldeck.timer.ready"></span>
        </div>
        <div class="timer-sub">
          <span class="timer-attempts" id="timer-attempts"></span>
          <span class="timer-delta" id="timer-delta"></span>
        </div>
      </div>

      <div class="timer-controls">
        <div class="timer-main-row">
          <button class="btn primary lg" id="btn-start" onclick="timerAction('start')" data-i18n="controldeck.timer.btn_start"></button>
          <button class="btn lg" id="btn-reset" onclick="timerAction('reset')" data-i18n="controldeck.timer.btn_reset"></button>
        </div>
        <div class="timer-sub-row">
          <button class="btn" onclick="timerAction('pause')" data-i18n="controldeck.timer.pause"></button>
          <button class="btn" onclick="timerAction('undo')" data-i18n="controldeck.timer.undo"></button>
          <button class="btn" onclick="timerAction('skip')" data-i18n="controldeck.timer.skip"></button>
        </div>
      </div>

      <div class="split-info">
        <span class="split-label" data-i18n="controldeck.split"></span>
        <span id="split-name">—</span>
      </div>
    </div>

    <!-- ── Chat Feed ─────────────────────────────────────────── -->
    <div class="card span-2" id="chat-card">
      <div class="card-header">
        <span class="card-title" data-i18n="controldeck.chat.card"></span>
        <div class="chat-status-row">
          <span class="cpill twitch" id="cd-twitch-pill"><span class="cdot"></span><span id="cd-twitch-label">Twitch</span></span>
          <span class="cpill youtube" id="cd-yt-pill"><span class="cdot"></span><span id="cd-yt-label">YouTube</span></span>
          <span style="font-size:10px;color:rgba(243,249,248,0.3);margin-left:auto" id="cd-msg-count"></span>
          <a href="/tool/chatdeck" style="font-size:10px;color:#a7fff0;text-decoration:none;border:1px solid rgba(167,255,240,0.3);border-radius:6px;padding:2px 7px;" data-i18n="controldeck.chat.open"></a>
        </div>
      </div>
      <div class="chat-feed-mini" id="cd-feed">
        <div class="chat-empty-hint" id="cd-empty">
          <span>💬</span>
          <span data-i18n="controldeck.chat.no_messages"></span>
          <span style="font-size:10px;color:rgba(243,249,248,0.18)" data-i18n="controldeck.chat.hint"></span>
        </div>
      </div>
    </div>

  </div><!-- /deck -->
</div><!-- /app -->

<div class="announce-banner" id="announce-banner"></div>

<script src="/tool/controldeck/controldeck.js"></script>
</body>
</html>
