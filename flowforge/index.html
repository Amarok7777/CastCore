<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FlowForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/design.css">
<link rel="stylesheet" href="/tool/flowforge/flowforge.css">
<script src="/shared/utils.js"></script>
<script src="/shared/i18n.js"></script>
<script src="/shared/toast.js"></script>
<script src="/shared/winctrl.js" defer></script>
</head>
<body>
<header class="tool-topbar">
  <div class="tool-topbar-brand">
    <span class="tool-topbar-name" data-i18n="flowforge.title">Flow<em>Forge</em></span>
    <span class="tool-topbar-sub" data-i18n="flowforge.subtitle">Automation</span>
  </div>
  <div class="tool-topbar-status">
    <span class="badge neutral" id="obs-badge"><span class="dot" style="opacity:.4"></span> <span data-i18n="flowforge.obs_disconnected">OBS getrennt</span></span>
  </div>
  <button class="btn sm" id="obs-reload-btn" onclick="reloadObs()">
    <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7a5 5 0 1 0 .75-2.6"/><path d="M2 2.5V7h4.5"/></svg>
    OBS neu laden
  </button>
  <a class="link" href="/" data-i18n="nav.back_hub">← Hub</a>
</header>

<main class="app">
  <div class="page-hd">
    <h1 data-i18n="flowforge.flows">Flows</h1>
    <button class="btn primary" onclick="openEditor(null)">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 1v10M1 6h10"/></svg>
      <span data-i18n="flowforge.new_flow">Neuer Flow</span>
    </button>
  </div>
  <div id="flows-container"></div>
</main>

<!-- ── Modal ── -->
<div class="modal-backdrop hidden" id="modal-backdrop">
  <div class="modal" id="modal">

    <div class="modal-header">
      <div class="modal-header-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4h12M2 8h8M2 12h5"/><path d="M13 10l2 2-2 2"/></svg>
      </div>
      <h2 id="modal-title">Neuer Flow</h2>
      <button class="btn sm modal-header-close" onclick="closeEditor()" title="Schließen (Esc)">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 1l10 10M11 1L1 11"/></svg>
      </button>
    </div>

    <div class="modal-body">

      <!-- Name + Enabled -->
      <div style="display:flex;gap:12px;align-items:flex-end">
        <div class="field-group" style="flex:1">
          <label for="flow-name" data-i18n="flowforge.flow.name_label">Flow-Name</label>
          <input id="flow-name" type="text" data-i18n-placeholder="flowforge.flow.name_ph" placeholder="z.B. Stream Start Szene"
            onkeydown="if(event.key==='Enter')document.getElementById('trigger-type').focus()">
        </div>
        <div class="toggle-row" style="padding-bottom:2px;flex-shrink:0">
          <input type="checkbox" class="toggle" id="flow-enabled" checked>
          <label for="flow-enabled" data-i18n="flowforge.active">Aktiv</label>
        </div>
      </div>

      <!-- Trigger -->
      <div class="editor-section">
        <div class="section-label">
          <div class="section-label-left">
            <span class="section-label-dot dot-trigger"></span>
            <span data-i18n="flowforge.trigger">Trigger</span>
          </div>
        </div>
        <div class="trigger-box" id="trigger-box">
          <div class="field-group">
            <label data-i18n="flowforge.event">Ereignis</label>
            <select id="trigger-type" onchange="renderTriggerConfig()"></select>
          </div>
          <div id="trigger-desc" class="trigger-desc"></div>
          <div id="trigger-config"></div>
        </div>
      </div>

      <!-- Conditions -->
      <div class="editor-section">
        <div class="section-label">
          <div class="section-label-left">
            <span class="section-label-dot dot-cond"></span>
            <span data-i18n="flowforge.conditions">Bedingungen</span>
            <span style="font-weight:400;color:var(--text-s);text-transform:none;letter-spacing:0;font-size:10px" data-i18n="flowforge.conditions.optional">(optional)</span>
          </div>
          <button class="btn xs" onclick="addConditionRow()">
            <svg width="9" height="9" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 1v8M1 5h8"/></svg>
            <span data-i18n="btn.add">Hinzufügen</span>
          </button>
        </div>
        <div id="conditions-list" class="rules-list"></div>
      </div>

      <!-- Actions -->
      <div class="editor-section">
        <div class="section-label">
          <div class="section-label-left">
            <span class="section-label-dot dot-action"></span>
            <span data-i18n="flowforge.actions">Aktionen</span>
          </div>
          <button class="btn xs" onclick="addActionRow()">
            <svg width="9" height="9" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 1v8M1 5h8"/></svg>
            <span data-i18n="btn.add">Hinzufügen</span>
          </button>
        </div>
        <div id="actions-list" class="rules-list"></div>
        <div id="val-error" class="val-error" data-i18n="flowforge.validation.need_action">Mindestens eine Aktion hinzufügen.</div>
      </div>

    </div>

    <div class="modal-footer">
      <span class="modal-footer-hint" id="modal-hint" data-i18n="flowforge.hint">Esc schließt · Strg+Enter speichert</span>
      <button class="btn sm" onclick="closeEditor()" data-i18n="btn.cancel">Abbrechen</button>
      <button class="btn primary" id="save-btn" onclick="saveFlow()">
        <div class="btn-spinner" id="save-spinner"></div>
        <svg id="save-icon" width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7.5l3.5 3.5L12 3"/></svg>
        <span data-i18n="btn.save">Speichern</span>
      </button>
    </div>

  </div>
</div>

<script src="/tool/flowforge/flowforge.js"></script>
</body>
</html>
